<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CH Infrastruktur-Status</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span id="overall-dot" class="dot"></span>
    <h1>CH Infrastruktur-Status</h1>
  </div>
  <div class="controls">
    <span id="overall" class="pill">Lade…</span>
    <span id="stamp" class="stamp"></span>
    <button id="refresh" type="button" title="Neu laden">↻</button>
  </div>
</header>

<main>
  <section id="status" class="status" aria-live="polite">Lade Status…</section>
  <div id="sections"></div>
  <p class="hint">Tipp: Auf eine Kachel klicken zeigt Begründung &amp; Quellen.</p>
</main>

<footer>
  <p>
    Cloud offiziell (Azure-Feed, Cloudflare/Fortinet Statuspage). CH-Telecom &amp;
    Microsoft 365 via Crowd-Meldungen (störunglive.ch, inoffiziell). Auto-Refresh 60s.
  </p>
</footer>

<!-- Kachel -->
<template id="tile-tpl">
  <button class="tile" type="button">
    <img class="tile-icon" alt="" loading="lazy" />
    <span class="tile-body">
      <span class="tile-name"></span>
      <span class="tile-headline"></span>
    </span>
    <span class="state-dot"></span>
  </button>
</template>

<!-- Detail-Overlay -->
<div id="modal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="m-name">
    <button class="modal-close" type="button" data-close aria-label="Schliessen">✕</button>
    <header class="modal-head">
      <img id="m-icon" class="m-icon" alt="" />
      <div>
        <h2 id="m-name"></h2>
        <span id="m-status" class="pill"></span>
      </div>
    </header>
    <p id="m-reason" class="m-reason"></p>
    <p id="m-method" class="m-method"></p>
    <h3 class="m-srctitle">Quellen &amp; Belege</h3>
    <ul id="m-sources" class="m-sources"></ul>
    <p id="m-updated" class="m-updated"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
